# BasketballBuddy 🏀 💼

BasketballBuddy is an NBA Front Office Analytics platform designed as a **front office assistant**, helping teams assess strengths and weaknesses, identify roster needs, and find optimal trade targets through data-driven analysis.

## Features

BasketballBuddy provides powerful tools for NBA front office decision-making:

- **Team Performance Analysis**: Evaluates 17+ statistical categories across the league to give you a comprehensive view of team performance.
- **Needs Identification**: Automatically flags team deficiencies based on league-wide rankings, categorizing needs as Critical (ranks 25-30), High (20-24), or Medium (15-19).
- **Trade Recommendations**: Player suggestions tailored to your team's specific requirements, with a Fit Score to evaluate potential impact.
- **Roster Management Tools**: Complete team finance views with full salary and contract information.
- **Live Data Integration**: Updates directly from official NBA statistics sources.

## How It Works

The platform ranks teams across metrics like shooting efficiency, rebounding, and defensive performance. Teams in the bottom third trigger need alerts with priority levels.

Trade candidates receive a **Fit Score (0-100)** factoring in:
- Skill alignment with team needs
- Age and contract status
- Impact metrics using DARKO's DPM ratings

The system distinguishes a player's trade availability into three tiers:
- **Unlikely**: Franchise stars
- **Likely**: Veterans on rebuilding teams
- **Possibly**: Everyone else

## Technologies

BasketballBuddy was built using these web technologies:
- Next.js 16
- React 19
- TypeScript 5
- Tailwind CSS 4
- NBA Stats API Integration
